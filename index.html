<!DOCTYPE html>
<html>

  <head>
    <title>Stylish Schedule</title>

    <style>

      body {
        font-family: Arial;
        background-color: #f2f2f2;
      }

      table {
        width: 70%;
        border-collapse: collapse;
        margin: 20px;
        background-color: white;
      }

      th {
        background-color: #4a6fa5;
        color: white;
        padding: 10px;
        border: 1px solid black;
      }

      td {
        padding: 10px;
        border: 1px solid black;
      }

      tr:hover {
        background-color: #dbe9ff;
      }
      
    </style>
    
  </head>

  <body>

    <h1>My Daily Schedule</h1>

    <table>

        <colgroup>
            <col style="background-color: #d6e4ff;">
            <col>
        </colgroup>

        <tr>
            <th>Time</th>
            <th>Event</th>
        </tr>

        <tr>
            <td>10:00 AM</td>
            <td>Wake Up</td>
        </tr>

        <tr>
            <td>10:30 AM</td>
            <td>Online Clases</td>
        </tr>

        <tr>
            <td>11:00 AM</td>
            <td>Work</td>
        </tr>

        <tr>
            <td>11:30 AM</td>
            <td>Lunch</td>
        </tr>

        <tr>
            <td>12:00 PM</td>
            <td>More Work</td>
        </tr>

        <tr>
            <td>4:00 PM</td>
            <td>Chess/Gaming</td>
        </tr>

        <tr>
            <td>6:00 PM</td>
            <td>Dinner</td>
        </tr>

        <tr>
            <td>8:00 PM</td>
            <td>Gaming/Relaxing/Work</td>
        </tr>

        <tr>
            <td>2:00 AM</td>
            <td>Sleep</td>
        </tr>

    </table>

    
  </body>
</html>
